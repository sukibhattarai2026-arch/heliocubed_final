name: Build HelioCubed Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - cpu-working

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sukibhattarai2026-arch/heliocubed_docker

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/sukibhattarai2026-arch/heliocubed_docker:latest
            ghcr.io/sukibhattarai2026-arch/heliocubed_docker:cpu-working
            ghcr.io/sukibhattarai2026-arch/heliocubed_docker:${{ github.sha }}